name: Vérification

# Déclenchement MANUEL : depuis l'app GitHub sur iPhone,
#   onglet Actions → « Vérification » → bouton « Run workflow ».
# Le rapport s'affiche directement dans le résumé du run, lisible sur mobile.
# Aucun fichier n'est modifié : ces scripts ne font que lire et rapporter.
on:
  # Veille hebdomadaire, le mercredi à 7h UTC. L'aspirateur tourne lundi et
  # jeudi : le mercredi tombe donc après que le run du lundi a été commité,
  # et avant celui du jeudi.
  schedule:
    - cron: "0 7 * * 3"
  workflow_dispatch:
    inputs:
      branche:
        description: "Branche contenant les fichiers de production."
        required: false
        default: "Android-cloudfare-production"
      depot_droit:
        description: "Dépôt du fonds (pour détecter les liens morts)."
        required: false
        default: "tonytonic/droit"

# Nécessaire pour ouvrir un ticket quand la veille trouve quelque chose.
permissions:
  contents: read
  issues: write

jobs:
  verifier:
    runs-on: ubuntu-latest
    steps:
      # ATTENTION — les fichiers de production ne sont PAS sur la branche par
      # défaut mais sur « Android-cloudfare-production ». Sans ce « ref », le
      # workflow vérifierait les fichiers de main et annoncerait des résultats
      # qui ne correspondent à rien de déployé.
      #
      # Le workflow lui-même doit en revanche RESTER sur la branche par défaut :
      # GitHub ne déclenche les exécutions planifiées que depuis celle-ci. Un
      # « schedule » posé sur la branche de production ne se lancerait jamais.
      - name: Récupérer l'application (branche de production)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branche || 'Android-cloudfare-production' }}

      # idcc_list.txt vit dans l'autre dépôt : sans lui, le contrôle des liens
      # morts est impossible. L'échec n'est pas bloquant — le reste tourne.
      - name: Récupérer le fonds (pour les liens morts)
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.depot_droit || 'tonytonic/droit' }}
          path: _droit

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer openpyxl
        run: pip install --quiet openpyxl

      - name: 1.1 — Santé des grilles de salaire
        continue-on-error: true
        run: |
          echo "Branche vérifiée : \`$(git rev-parse --abbrev-ref HEAD)\` — commit \`$(git rev-parse --short HEAD)\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 1.1 — Santé des grilles" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f _droit/idcc_list.txt ]; then
            OPT="--idcc-suivis _droit/idcc_list.txt"
          else
            OPT=""
            echo "> Le dépôt du fonds n'a pas pu être lu : le contrôle des liens morts est ignoré." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          python3 verifier-grilles.py $OPT --out /tmp/g.md
          cat /tmp/g.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: 1.2 — Cohérence des fichiers CCN
        continue-on-error: true
        run: |
          echo "## 1.2 — Cohérence des fichiers CCN" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 verifier-ccn.py \
            --dares ccn/Dares_Suivi_Historique_convention_collective_Juin2026.xlsx \
            --out /tmp/c.md
          cat /tmp/c.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: 1.3 — Tableau de suivi
        continue-on-error: true
        run: |
          echo "## 1.3 — Tableau de suivi" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cd GrillePaye && python3 tracking-ccn.py >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # Veille : le fonds a-t-il des avenants plus récents que nos grilles ?
      # C'est la seule étape qui compare les deux dépôts, elle a donc besoin
      # que la récupération du fonds ait réussi.
      - name: 1.4 — Veille des grilles
        continue-on-error: true
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d _droit/output/ccn ]; then
            python3 verifier-fraicheur.py --fonds _droit/output/ccn --out /tmp/v.md
            cat /tmp/v.md >> $GITHUB_STEP_SUMMARY
            # Marqueur pour l'étape suivante : y a-t-il quelque chose à faire ?
            if grep -q "grille(s) dépassée(s)" /tmp/v.md; then echo "ACTION=1" >> $GITHUB_ENV; fi
          else
            echo "## Veille des grilles" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Le dossier \`output/ccn\` du fonds n'est pas accessible : veille ignorée." >> $GITHUB_STEP_SUMMARY
          fi

      # Le test 2.1 du cahier de recette demandait un « curl » depuis un
      # terminal, impossible sur téléphone. Il est fait ici.
      - name: 2.1 — MonLegiTexte n'est pas indexable
        continue-on-error: true
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 2.1 — MonLegiTexte hors index" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          URL="https://monlegitexte.heuressupfrance.workers.dev/"
          H=$(curl -sI "$URL" | tr -d '\r')
          if echo "$H" | grep -qi "x-robots-tag:.*noindex"; then
            echo "- En-tête \`x-robots-tag: noindex\` : **présent** ✓" >> $GITHUB_STEP_SUMMARY
          else
            echo "- En-tête \`x-robots-tag: noindex\` : **ABSENT** ✗ — le worker n'est pas déployé" >> $GITHUB_STEP_SUMMARY
          fi
          R=$(curl -s -o /dev/null -w "%{http_code}" "${URL}robots.txt")
          if [ "$R" = "200" ]; then
            echo "- \`/robots.txt\` répond 200 ✓" >> $GITHUB_STEP_SUMMARY
          else
            echo "- \`/robots.txt\` répond $R ✗" >> $GITHUB_STEP_SUMMARY
          fi

      # Sans ceci, un run planifié qui trouve une grille périmée passerait
      # inaperçu : GitHub ne notifie que les échecs, pas les succès. Le ticket
      # déclenche une notification sur téléphone, et sert d'aide-mémoire.
      # Un seul ticket est maintenu à la fois : on met à jour le précédent au
      # lieu d'en accumuler un par semaine.
      - name: Signaler par un ticket si la veille a trouvé quelque chose
        if: env.ACTION == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITRE="Veille des grilles — $(date +%d/%m/%Y)"
          CORPS=$(cat /tmp/v.md)
          EXISTANT=$(gh issue list --label veille-grilles --state open \
                       --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTANT" ]; then
            gh issue edit "$EXISTANT" --title "$TITRE" --body "$CORPS"
            echo "Ticket #$EXISTANT mis à jour." >> $GITHUB_STEP_SUMMARY
          else
            gh label create veille-grilles --description "Grilles à rafraîchir" \
              --color FBCA04 2>/dev/null || true
            gh issue create --title "$TITRE" --body "$CORPS" --label veille-grilles
            echo "Ticket ouvert." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Rapports téléchargeables
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-verification
          path: /tmp/*.md
          if-no-files-found: ignore
