<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Référentiel juridique — Maintenance</title>
<script src="articles-loi.js"></script>
<style>
  :root{--bg:#0f1420;--card:#1a2030;--edge:rgba(255,255,255,0.08);--gold:#f0c040;--txt:#e8e8e8;--mute:rgba(255,255,255,0.5);--green:#7ddb7d;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);padding:16px;line-height:1.5;padding-bottom:60px;}
  h1{font-size:20px;color:var(--gold);margin-bottom:4px;}
  .sub{font-size:12px;color:var(--mute);margin-bottom:20px;}
  .maj{display:inline-block;background:rgba(125,219,125,0.15);color:var(--green);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:18px;}
  h2{font-size:15px;color:var(--gold);margin:24px 0 10px;border-bottom:1px solid var(--edge);padding-bottom:6px;}
  .search{width:100%;background:var(--card);border:1px solid var(--edge);border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;margin-bottom:16px;font-family:inherit;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:10px;}
  th{text-align:left;color:var(--mute);font-size:10.5px;text-transform:uppercase;letter-spacing:0.5px;padding:6px 8px;border-bottom:1px solid var(--edge);}
  td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top;}
  .k{font-family:'SF Mono',Menlo,monospace;color:var(--gold);font-size:11.5px;white-space:nowrap;}
  .v{font-weight:700;color:#fff;white-space:nowrap;}
  .u{color:var(--mute);font-size:11px;}
  .d{color:var(--mute);font-size:11px;}
  .art-card{background:var(--card);border:1px solid var(--edge);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .art-ref{font-family:'SF Mono',Menlo,monospace;color:var(--gold);font-size:12px;font-weight:700;}
  .art-code{display:inline-block;background:rgba(240,192,64,0.15);color:var(--gold);font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;}
  .art-titre{font-weight:700;color:#fff;font-size:13px;margin:4px 0;}
  .art-texte{color:var(--mute);font-size:12px;}
  .hidden{display:none;}
  .count{color:var(--mute);font-size:11px;font-weight:400;}
</style>
</head>
<body>
  <h1>🗂️ Référentiel juridique</h1>
  <div class="sub">Source unique de vérité pour les 54 modules · fichier <code>articles-loi.js</code></div>
  <div class="maj" id="majBadge"></div>

  <input class="search" id="search" placeholder="🔍 Rechercher une valeur, un article, un mot-clé…">

  <h2>Valeurs chiffrées <span class="count" id="cntVal"></span></h2>
  <table id="tblValeurs">
    <thead><tr><th>Clé</th><th>Valeur</th><th>Effet</th><th>Source / note</th></tr></thead>
    <tbody id="bodyValeurs"></tbody>
  </table>

  <h2>Articles de loi <span class="count" id="cntArt"></span></h2>
  <div id="listArticles"></div>

<script>
(function(){
  document.getElementById('majBadge').textContent = 'Dernière révision : ' + SH.maj.call({}, '_x') === '—'
    ? 'Dernière révision : ' + SH._maj_referentiel
    : 'Dernière révision : ' + SH._maj_referentiel;

  // Valeurs
  var bodyV = document.getElementById('bodyValeurs');
  var vKeys = Object.keys(SH.VALEURS);
  document.getElementById('cntVal').textContent = '(' + vKeys.length + ')';
  vKeys.forEach(function(k){
    var e = SH.VALEURS[k];
    var tr = document.createElement('tr');
    tr.className = 'row-val';
    tr.setAttribute('data-search', (k + ' ' + e.v + ' ' + (e.u||'') + ' ' + (e.src||'')).toLowerCase());
    tr.innerHTML = '<td class="k">'+k+'</td>'+
      '<td class="v">'+String(e.v).replace('.',',')+' <span class="u">'+(e.u||'')+'</span></td>'+
      '<td class="d">'+SH.maj(k)+'</td>'+
      '<td class="d">'+(e.src||'')+'</td>';
    bodyV.appendChild(tr);
  });

  // Articles
  var listA = document.getElementById('listArticles');
  var aKeys = Object.keys(SH.ARTICLES);
  document.getElementById('cntArt').textContent = '(' + aKeys.length + ')';
  aKeys.forEach(function(k){
    var a = SH.ARTICLES[k];
    var div = document.createElement('div');
    div.className = 'art-card row-art';
    div.setAttribute('data-search', (k + ' ' + a.titre + ' ' + a.texte + ' ' + a.code).toLowerCase());
    div.innerHTML = '<span class="art-ref">Art. '+k+'</span><span class="art-code">'+a.code+'</span>'+
      '<div class="art-titre">'+a.titre+'</div>'+
      '<div class="art-texte">'+a.texte+'</div>';
    listA.appendChild(div);
  });

  // Recherche
  document.getElementById('search').addEventListener('input', function(e){
    var q = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.row-val, .row-art').forEach(function(el){
      var hit = !q || el.getAttribute('data-search').indexOf(q) >= 0;
      el.classList.toggle('hidden', !hit);
    });
  });
})();
</script>
</body>
</html>
