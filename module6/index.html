// Enregistrement Service Worker PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[M6] SW enregistre:', reg.scope))
      .catch(err => console.warn('[M6] SW echec:', err));
  });
}
// Rappel vendredi via Notifications (si permission accordée)
(function scheduleVendrediReminder() {
  const d = new Date();
  if (d.getDay() !== 5) return; // vendredi seulement
  const lastReminder = localStorage.getItem('M6_VENDREDI_REMINDER');
  const today = d.toISOString().slice(0,10);
  if (lastReminder === today) return;
  if (Notification.permission === 'granted') {
    new Notification('Zenji — Rappel vendredi', {
      body: 'Pensez a valider votre semaine et a mettre a jour votre forfait. Bonne fin de semaine !',
      icon: 'images/Cadre.png',
    });
    localStorage.setItem('M6_VENDREDI_REMINDER', today);
  }
})();
</script>
