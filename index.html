<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulateur HS</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="theme-color" content="#4FB3C2">

  <script>
    const APP_VERSION = "1.6.2"; // Mis à jour pour correspondre au sw.js

    async function registerSW() {
      if ('serviceWorker' in navigator) {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js');
          console.log("✅ Service Worker enregistré");

          // --- OPTIMISATION : ENREGISTREMENT PERIODIC SYNC ---
          // Cela aide PWABuilder à voir que tu utilises activement l'API
          if ('periodicSync' in reg) {
            const status = await navigator.permissions.query({
              name: 'periodic-background-sync',
            });
            if (status.state === 'granted') {
              await reg.periodicSync.register('update-cache', {
                minInterval: 24 * 60 * 60 * 1000, // 24h
              });
            }
          }
        } catch (err) {
          console.error("❌ Échec SW:", err);
        }
      }
    }

    // Gestion de la version et redirection
    async function initApp() {
      await registerSW();

      const stored = localStorage.getItem("APP_VERSION");

      if (stored !== APP_VERSION) {
        localStorage.setItem("APP_VERSION", APP_VERSION);
        // On force le rafraîchissement pour vider le cache navigateur
        location.reload(true); 
      } else {
        // Redirection vers le menu après un court délai pour la stabilité sur mobile
        setTimeout(() => {
          location.replace("./menu.html");
        }, 300);
      }
    }

    window.addEventListener('DOMContentLoaded', initApp);
  </script>

  <style>
    body {
      background: #4FB3C2;
      color: white;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
  </style>
</head>
<body>
  <div style="text-align: center;">
    <p>Chargement du simulateur...</p>
    <small>Version v1.6.2</small>
  </div>
</body>
</html>
