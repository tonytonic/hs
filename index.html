<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulateur HS</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="theme-color" content="#4FB3C2">

  <script>
    const APP_VERSION = "1.6.2"; 

    async function registerSW() {
      if ('serviceWorker' in navigator) {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js');
          console.log("✅ Service Worker enregistré");
        } catch (err) {
          console.error("❌ Échec SW:", err);
        }
      }
    }

    async function initApp() {
      await registerSW();

      const stored = localStorage.getItem("APP_VERSION");

      if (stored !== APP_VERSION) {
        localStorage.setItem("APP_VERSION", APP_VERSION);
        // On force le rafraîchissement pour vider le vieux cache
        location.reload(true); 
      } else {
        // IMPORTANT : On laisse 1.5s pour que le SW finisse sa mise en cache
        // C'est ce délai qui permet à PWABuilder de valider le mode Offline
        setTimeout(() => {
          location.replace("./menu.html");
        }, 1500);
      }
    }

    window.addEventListener('DOMContentLoaded', initApp);
  </script>

  <style>
    body {
      background: #4FB3C2;
      color: white;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
  </style>
</head>
<body>
  <div style="text-align: center;">
    <p>Initialisation du simulateur...</p>
    <small>Version v1.6.2</small>
  </div>
</body>
</html>
