<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Simulateur HS</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#4FB3C2">
  <meta name="mobile-web-app-capable" content="yes">

  <script>
    const APP_VERSION = "6.0.2"; 

    async function registerSW() {
      if ('serviceWorker' in navigator) {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js');
          console.log("✅ Service Worker enregistré");

          if ('periodicSync' in reg) {
            const status = await navigator.permissions.query({
              name: 'periodic-background-sync',
            });
            if (status.state === 'granted') {
              await reg.periodicSync.register('update-cache', {
                minInterval: 24 * 60 * 60 * 1000,
              });
            }
          }
        } catch (err) {
          console.error("❌ Échec SW:", err);
        }
      }
    }

    async function initApp() {
      await registerSW();

      const stored = localStorage.getItem("APP_VERSION");

      if (stored !== APP_VERSION) {
        localStorage.setItem("APP_VERSION", APP_VERSION);

        // 🔥 FIX iOS : reload propre
        window.location.href = "/";
        return;
      }

      // 🔥 FIX iOS : redirection propre sans conflit SW
      window.location.href = "/menu.html";
    }

    window.addEventListener('DOMContentLoaded', initApp);
  </script>

  <style>
    body {
      background: #4FB3C2;
      color: white;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div style="text-align: center;">
    <div class="loader"></div>
    <p>Lancement du simulateur RPG...</p>
    <small>Version v6.0.2</small>
  </div>
</body>
</html>
